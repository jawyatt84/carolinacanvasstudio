<script>
const cv=document.getElementById('sp');
const cx=cv.getContext('2d');
let W,H,tick=0;
function resize(){W=cv.parentElement.clientWidth;H=520;cv.width=W;cv.height=H;}
function iso(gx,gy,gz){return{x:W/2+(gx-gy)*38,y:H*0.42-gz*32+(gx+gy)*21};}
const SP={floor1:'#2e1c0a',floor2:'#241408',copper:'#b87333',copperH:'#d4954a',copperD:'#7a4a1a',brass:'#c8860a',brassH:'#e8a828',brassD:'#8a5a06',iron:'#3c3228',ironH:'#504840',ironD:'#28201a',wood:'#5a3010',woodD:'#3a1e08',glow:'#ff9920',};
const stars=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.5+0.2,b:Math.random()}));
const nebulas=Array.from({length:5},()=>({x:Math.random(),y:Math.random()*0.8,col:['#1a0a2a','#0a1f3a','#0f2a20','#2a0a10'][Math.floor(Math.random()*4)]}));
const steamPs=[];
const vents=[{gx:0.4,gy:0.1,gz:2.2,phase:0,rate:0.2},{gx:6.6,gy:0.3,gz:2.4,phase:2,rate:0.18},{gx:2.8,gy:3.9,gz:1.4,phase:4,rate:0.15},{gx:5.0,gy:3.7,gz:1.6,phase:1,rate:0.12}];
function spawnSteam(){vents.forEach(v=>{if(Math.random()>v.rate)return;const p=iso(v.gx,v.gy,v.gz);steamPs.push({x:p.x,y:p.y,vx:(Math.random()-0.5)*0.5,vy:-0.7-Math.random()*0.5,life:1,r:4+Math.random()*4});});}
const gears=[{gx:-0.1,gy:0.1,gz:1.6,r:22,teeth:12,spd:0.018,ph:0,col:SP.copper},{gx:0.55,gy:0.05,gz:1.6,r:13,teeth:7,spd:-0.031,ph:0,col:SP.brass},{gx:6.6,gy:0.4,gz:1.9,r:26,teeth:14,spd:0.013,ph:1,col:SP.copper},{gx:7.35,gy:0.35,gz:1.9,r:15,teeth:8,spd:-0.023,ph:0,col:SP.brass},{gx:-0.2,gy:3.6,gz:1.2,r:18,teeth:10,spd:0.022,ph:2,col:SP.ironH},{gx:7.5,gy:3.5,gz:1.2,r:18,teeth:10,spd:-0.019,ph:1,col:SP.copper},{gx:3.4,gy:4.1,gz:0.8,r:14,teeth:8,spd:0.025,ph:0,col:SP.brass}];
const pipes=[[{gx:0.3,gy:0,gz:2},{gx:2,gy:0,gz:2},{gx:2,gy:1.5,gz:2},{gx:2,gy:1.5,gz:0.5}],[{gx:6.8,gy:0,gz:2.2},{gx:5.2,gy:0,gz:2.2},{gx:5.2,gy:2,gz:2.2},{gx:5.2,gy:2,gz:0.5}],[{gx:0,gy:2,gz:1.2},{gx:1.2,gy:2,gz:1.2},{gx:1.2,gy:3.2,gz:1.2}],[{gx:7,gy:2.5,gz:1},{gx:5.5,gy:2.5,gz:1}],[{gx:1,gy:4,gz:0.8},{gx:3.5,gy:4,gz:0.8},{gx:3.5,gy:2.5,gz:0.8}]];
const WS=[{gx:0.2,gy:1.0,name:'Scout',label:'SCOUT-01',task:'Mapping leads'},{gx:2.1,gy:0.2,name:'Researcher',label:'RSRCH-02',task:'Profiling'},{gx:4.2,gy:0.4,name:'Copywriter',label:'COPY-03',task:'Composing'},{gx:1.3,gy:2.8,name:'Mailer',label:'MAIL-04',task:'Dispatching'},{gx:5.0,gy:2.0,name:'Builder',label:'BUILD-05',task:'Constructing'}];
const ACOLS=[{coat:'#1a3a2a',trim:'#2dd4bf',eye:'#00ffcc',hat:'#0f2a1e',goggle:'#003322',pipe:'#2dd4bf88'},{coat:'#2a1a4a',trim:'#9977dd',eye:'#cc99ff',hat:'#1a1038',goggle:'#220044',pipe:'#9977dd88'},{coat:'#3a2008',trim:'#e8a020',eye:'#ffcc44',hat:'#281406',goggle:'#332200',pipe:'#e8a02088'},{coat:'#3a1020',trim:'#dd4488',eye:'#ff88bb',hat:'#28080e',goggle:'#330018',pipe:'#dd448888'},{coat:'#0c1e3e',trim:'#4499ee',eye:'#88ccff',hat:'#081428',goggle:'#001133',pipe:'#4499ee88'}];
const agentStates=WS.map(()=>'idle');
const walkers=WS.map((ws,i)=>({x:ws.gx+0.5,y:ws.gy+0.5,tx:ws.gx+0.5,ty:ws.gy+0.5,homeX:ws.gx+0.5,homeY:ws.gy+0.5,spd:0.011+Math.random()*0.005,wait:60+Math.floor(Math.random()*80),walking:false,frame:0,colIdx:i}));
function pickTarget(w,idx){const st=agentStates[idx];if(st==='running'){w.tx=WS[idx].gx+0.5+(Math.random()-0.5)*0.3;w.ty=WS[idx].gy+0.5+(Math.random()-0.5)*0.3;}else{const opts=[{x:w.homeX+(Math.random()-0.5)*0.5,y:w.homeY+(Math.random()-0.5)*0.5},{x:w.homeX+(Math.random()-0.5)*1.5,y:w.homeY+(Math.random()-0.5)*1.5},{x:WS[(idx+1)%5].gx+0.5,y:WS[(idx+1)%5].gy+0.5},{x:WS[(idx+2)%5].gx+0.5,y:WS[(idx+2)%5].gy+0.5}];const t=opts[Math.floor(Math.random()*opts.length)];w.tx=Math.max(0.4,Math.min(6.6,t.x));w.ty=Math.max(0.4,Math.min(3.6,t.y));}w.walking=true;}
function updateWalkers(){walkers.forEach((w,i)=>{if(w.wait>0){w.wait--;return;}if(!w.walking){pickTarget(w,i);return;}const dx=w.tx-w.x,dy=w.ty-w.y,dist=Math.hypot(dx,dy);if(dist<0.04){w.walking=false;w.wait=50+Math.floor(Math.random()*100);return;}w.x+=dx/dist*w.spd;w.y+=dy/dist*w.spd;w.frame++;});}
function drawGear(g){const p=iso(g.gx,g.gy,g.gz);const a=tick*g.spd+g.ph;cx.save();cx.translate(p.x,p.y);cx.fillStyle=g.col+'22';cx.strokeStyle=g.col;cx.lineWidth=1.5;cx.beginPath();cx.arc(0,0,g.r,0,Math.PI*2);cx.fill();cx.stroke();cx.strokeStyle=g.col+'cc';cx.lineWidth=2;for(let t=0;t<g.teeth;t++){const ta=a+t*(Math.PI*2/g.teeth);cx.beginPath();cx.moveTo(Math.cos(ta)*g.r,Math.sin(ta)*g.r);cx.lineTo(Math.cos(ta)*(g.r+7),Math.sin(ta)*(g.r+7));cx.stroke();}cx.lineWidth=1.5;cx.beginPath();cx.moveTo(-g.r*0.6,0);cx.lineTo(g.r*0.6,0);cx.stroke();cx.beginPath();cx.moveTo(0,-g.r*0.6);cx.lineTo(0,g.r*0.6);cx.stroke();cx.fillStyle=g.col;cx.beginPath();cx.arc(0,0,g.r*0.18,0,Math.PI*2);cx.fill();cx.fillStyle=g.col+'55';cx.beginPath();cx.arc(0,0,g.r*0.5,0,Math.PI*2);cx.fill();cx.restore();}
function drawPipes(){pipes.forEach(pipe=>{cx.lineWidth=7;cx.strokeStyle=SP.copperD;cx.lineCap='round';cx.lineJoin='round';cx.beginPath();const s=iso(pipe[0].gx,pipe[0].gy,pipe[0].gz);cx.moveTo(s.x,s.y);pipe.forEach(pt=>{const p=iso(pt.gx,pt.gy,pt.gz);cx.lineTo(p.x,p.y);});cx.stroke();cx.lineWidth=4;cx.strokeStyle=SP.copper;cx.beginPath();cx.moveTo(s.x,s.y);pipe.forEach(pt=>{const p=iso(pt.gx,pt.gy,pt.gz);cx.lineTo(p.x,p.y);});cx.stroke();cx.lineWidth=1.5;cx.strokeStyle=SP.copperH+'66';cx.beginPath();cx.moveTo(s.x,s.y);pipe.forEach(pt=>{const p=iso(pt.gx,pt.gy,pt.gz);cx.lineTo(p.x,p.y);});cx.stroke();pipe.forEach(pt=>{const p=iso(pt.gx,pt.gy,pt.gz);cx.fillStyle=SP.brassD;cx.strokeStyle=SP.brass;cx.lineWidth=1;cx.beginPath();cx.arc(p.x,p.y,6,0,Math.PI*2);cx.fill();cx.stroke();cx.fillStyle=SP.brassH;cx.beginPath();cx.arc(p.x-1,p.y-1,2,0,Math.PI*2);cx.fill();});});cx.lineCap='butt';}
function drawVentsAndSteam(){vents.forEach(v=>{const p=iso(v.gx,v.gy,v.gz);cx.fillStyle=SP.iron;cx.strokeStyle=SP.copper;cx.lineWidth=1.5;cx.beginPath();cx.ellipse(p.x,p.y,9,5,0,0,Math.PI*2);cx.fill();cx.stroke();const glow=0.5+0.5*Math.sin(tick*0.09+v.phase);cx.fillStyle=`rgba(255,180,60,${glow*0.5})`;cx.beginPath();cx.ellipse(p.x,p.y,5,3,0,0,Math.PI*2);cx.fill();});for(let i=steamPs.length-1;i>=0;i--){const s=steamPs[i];s.x+=s.vx;s.y+=s.vy;s.life-=0.01;s.r+=0.1;if(s.life<=0){steamPs.splice(i,1);continue;}cx.globalAlpha=s.life*0.28;cx.fillStyle='rgba(220,200,170,1)';cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fill();cx.globalAlpha=1;}}
function drawFloor(){for(let gy=0;gy<4;gy++)for(let gx=0;gx<7;gx++){const tl=iso(gx,gy,0),tr=iso(gx+1,gy,0),br=iso(gx+1,gy+1,0),bl=iso(gx,gy+1,0);cx.beginPath();cx.moveTo(tl.x,tl.y);cx.lineTo(tr.x,tr.y);cx.lineTo(br.x,br.y);cx.lineTo(bl.x,bl.y);cx.closePath();cx.fillStyle=(gx+gy)%2===0?SP.floor1:SP.floor2;cx.fill();cx.strokeStyle='rgba(180,110,40,0.1)';cx.lineWidth=0.5;cx.stroke();if(gx%2===0&&gy%2===0){const corners=[iso(gx,gy,0.01),iso(gx+1,gy,0.01),iso(gx,gy+1,0.01),iso(gx+1,gy+1,0.01)];corners.forEach(c=>{cx.fillStyle=SP.ironD;cx.beginPath();cx.arc(c.x,c.y,2.5,0,Math.PI*2);cx.fill();cx.strokeStyle=SP.iron+'88';cx.lineWidth=0.5;cx.beginPath();cx.arc(c.x,c.y,2.5,0,Math.PI*2);cx.stroke();});}}}
function drawWalls(){for(let gx=0;gx<7;gx++){const bl=iso(gx,4,0),tl=iso(gx,4,3),tr=iso(gx+1,4,3),br=iso(gx+1,4,0);cx.beginPath();cx.moveTo(bl.x,bl.y);cx.lineTo(tl.x,tl.y);cx.lineTo(tr.x,tr.y);cx.lineTo(br.x,br.y);cx.closePath();cx.fillStyle='#180c02';cx.fill();cx.strokeStyle='rgba(160,90,30,0.12)';cx.lineWidth=0.5;cx.stroke();}for(let gy=0;gy<4;gy++){const bl=iso(7,gy,0),tl=iso(7,gy,3),tr=iso(7,gy+1,3),br=iso(7,gy+1,0);cx.beginPath();cx.moveTo(bl.x,bl.y);cx.lineTo(tl.x,tl.y);cx.lineTo(tr.x,tr.y);cx.lineTo(br.x,br.y);cx.closePath();cx.fillStyle='#120a02';cx.fill();cx.strokeStyle='rgba(120,70,20,0.1)';cx.lineWidth=0.5;cx.stroke();}[[1,4,0.3],[2,4,0.3],[3,4,0.3],[4,4,0.3],[5,4,0.3],[6,4,0.3],[1,4,2.7],[2,4,2.7],[3,4,2.7],[4,4,2.7],[5,4,2.7],[6,4,2.7],[7,1,0.3],[7,2,0.3],[7,3,0.3],[7,1,2.7],[7,2,2.7],[7,3,2.7]].forEach(([gx,gy,gz])=>{const p=iso(gx,gy,gz);cx.fillStyle=SP.ironD;cx.beginPath();cx.arc(p.x,p.y,3,0,Math.PI*2);cx.fill();cx.strokeStyle=SP.iron;cx.lineWidth=0.5;cx.beginPath();cx.arc(p.x,p.y,3,0,Math.PI*2);cx.stroke();});const portholes=[{gx:0.5,gz:1.8},{gx:2.0,gz:1.8},{gx:3.5,gz:2.0},{gx:5.0,gz:1.8},{gx:6.5,gz:1.8}];portholes.forEach((ph,pi)=>{const p=iso(ph.gx,4,ph.gz);const pr=18;cx.save();cx.beginPath();cx.arc(p.x,p.y,pr-3,0,Math.PI*2);cx.clip();cx.fillStyle='#02040c';cx.fillRect(p.x-pr,p.y-pr,pr*2,pr*2);cx.fillStyle=nebulas[pi%nebulas.length].col+'aa';cx.beginPath();cx.arc(p.x+4,p.y-3,pr,0,Math.PI*2);cx.fill();for(let si=pi*12;si<pi*12+15;si++){const sx=stars[si%stars.length];const spx=p.x-pr+sx.x*pr*2.2,spy=p.y-pr+sx.y*pr*2.2;cx.globalAlpha=0.4+sx.b*0.6;cx.fillStyle=sx.b>0.7?'#9fe1cb':'#ffffff';cx.beginPath();cx.arc(spx,spy,sx.r*0.6,0,Math.PI*2);cx.fill();}cx.globalAlpha=1;if(pi===2){cx.fillStyle='#1a3a5a';cx.beginPath();cx.arc(p.x+6,p.y+5,9,0,Math.PI*2);cx.fill();cx.strokeStyle='#2a5a8a';cx.lineWidth=0.5;cx.beginPath();cx.arc(p.x+6,p.y+5,9,0,Math.PI*2);cx.stroke();}cx.restore();cx.strokeStyle=SP.brassD;cx.lineWidth=5;cx.beginPath();cx.arc(p.x,p.y,pr,0,Ma function drawBg(){cx.fillStyle='#0e0702';cx.fillRect(0,0,W,H);const gr=cx.createRadialGradient(W/2,H,20,W/2,H,H);gr.addColorStop(0,'rgba(60,30,5,0.4)');gr.addColorStop(1,'transparent');cx.fillStyle=gr;cx.fillRect(0,0,W,H);}
function loop(){tick++;spawnSteam();updateWalkers();drawBg();drawWalls();drawFloor();drawPipes();gears.forEach(drawGear);drawVentsAndSteam();const items=[...WS.map((_,i)=>({type:'ws',i,depth:WS[i].gy})),...walkers.map((w,i)=>({type:'ag',i,depth:w.y}))].sort((a,b)=>a.depth-b.depth);items.forEach(it=>{if(it.type==='ws')drawWorkstation(WS[it.i],it.i,agentStates[it.i]);else drawAgent(walkers[it.i]);});requestAnimationFrame(loop);}

cv.addEventListener('click',e=>{const r=cv.getBoundingClientRect();const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);let best=-1,bd=999;walkers.forEach((w,i)=>{const p=iso(w.x,w.y,0.5);const dist=Math.hypot(p.x-mx,p.y-my);if(dist<45&&dist<bd){bd=dist;best=i;}});if(best>=0)activateAgent(best);});
